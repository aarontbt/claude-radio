name: ClaudeRadio
options:
  bundleIdPrefix: com.xenohawk
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ClaudeRadio:
    type: application
    platform: macOS
    sources:
      - path: ClaudeRadio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xenohawk.ClaudeRadio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Radio"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Unofficial fan app. Not affiliated with Anthropic."
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        ENABLE_APP_SANDBOX: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
    entitlements:
      path: ClaudeRadio/ClaudeRadio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    scheme:
      testTargets:
        - ClaudeRadioTests
      config:
        Debug: Debug
        Release: Release

  ClaudeRadioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeRadioTests
    dependencies:
      - target: ClaudeRadio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xenohawk.ClaudeRadio.Tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ClaudeRadio:
    build:
      targets:
        ClaudeRadio: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeRadioTests
    archive:
      config: Release
